kind = "slides"
previewPath = "/marketing-deck/"
title = "Investment Decision Lab — LinkedIn Carousel"
version = "1.0.0"
id = "artifacts/marketing-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/marketing-deck/" ]
localPort = 25628

[services.development]
run = "pnpm --filter @workspace/marketing-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marketing-deck", "run", "build" ]
publicDir = "artifacts/marketing-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25628"
BASE_PATH = "/marketing-deck/"
