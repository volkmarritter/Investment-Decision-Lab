name: Refresh ETF top holdings (monthly justETF look-through)

# Monthly cadence for the per-ISIN top-10 holdings list. Writes to a separate
# override file (src/data/lookthrough.overrides.json) and only touches the
# `topHoldings` array (plus a per-ISIN `topHoldingsAsOf` ISO timestamp).
# Geo / sector / currency breakdowns stay hand-curated (justETF Ajax-loads
# those tables, so the regex-based scraper can't reach them).

on:
  schedule:
    - cron: "0 4 1 * *" # 04:00 UTC on the 1st of every month
  workflow_dispatch: # allow manual triggering from the Actions tab

# Serialise with refresh-data.yml and refresh-listings.yml: although this job
# writes to a different overrides file (lookthrough.overrides.json), it now
# also appends to the shared src/data/refresh-runs.log.md and pushes to the
# same branch. Sharing the concurrency group prevents push races
# (non-fast-forward failures) when the monthly run overlaps with a manual
# dispatch of the weekly/nightly jobs.
concurrency:
  group: etf-overrides-write
  cancel-in-progress: false

permissions:
  contents: write # required to commit the refreshed JSON

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Refresh top-holdings from justETF (monthly)
        working-directory: artifacts/investment-lab
        run: node scripts/refresh-lookthrough.mjs

      - name: Run typecheck and tests against the new snapshot
        working-directory: artifacts/investment-lab
        run: |
          pnpm run typecheck
          pnpm run test

      - name: Commit & push if changed
        # The run-log file is always touched by the script (one row per run,
        # success or fail), so this monthly commit step always has something
        # to push — even when no holdings/breakdowns changed. That guarantees
        # every scheduled invocation leaves a git commit and a Trigger-tagged
        # row in src/data/refresh-runs.log.md.
        run: |
          git add artifacts/investment-lab/src/data/lookthrough.overrides.json artifacts/investment-lab/src/data/refresh-runs.log.md || true
          if [[ -n "$(git status --porcelain artifacts/investment-lab/src/data/lookthrough.overrides.json artifacts/investment-lab/src/data/refresh-runs.log.md)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(data): monthly justETF look-through snapshot $(date -u +%Y-%m-%d)"
            # Retry push once on non-fast-forward (e.g. a human commit landed
            # while this job was running). The concurrency group prevents
            # bot-vs-bot races; this guards bot-vs-human.
            git push || (git pull --rebase --autostash && git push)
          else
            echo "No file changes (unexpected — run log should always be updated)."
          fi
