name: justETF layout smoke check (daily)

# Daily early-warning channel for justETF layout / data-testid changes.
#
# The three scheduled refresh jobs (refresh-data.yml weekly, refresh-listings.yml
# nightly, refresh-lookthrough.yml monthly) all use "no-clobber" extractors:
# when a regex stops matching, the previous override value is preserved on
# disk and the job exits 0 as long as failures don't outnumber successes.
# That is the correct behaviour for the production refresh path (partial data
# beats wiped data), but it means a slow rolling break across many ISINs can
# go unnoticed for days.
#
# This workflow closes that gap. It runs scripts/smoke-justetf.mjs once a day,
# which fetches one well-known live profile page per ETF type (equity / gold /
# crypto), runs the same exported extractors used by the refresh scripts, and
# fails the workflow the moment any expected field comes back empty. CI then
# surfaces the breakage as a red run the same day justETF changes their
# markup, instead of weeks later when someone happens to refresh the fixtures.
#
# This is intentionally read-only: nothing is committed, no override file is
# touched. The job's only output is a green or red badge.

on:
  schedule:
    - cron: "30 5 * * *" # 05:30 UTC every day — chosen to not collide with
                         # refresh-data.yml (Sun 03:00), refresh-listings.yml
                         # (daily 02:00) or refresh-lookthrough.yml (1st 04:00)
  workflow_dispatch: # allow manual re-runs from the Actions tab after a fix

# Read-only against the codebase, but the failure-notify step opens / comments
# on a tracking issue so the on-call engineer learns about a layout regression
# the same day instead of the next time someone happens to look at CI.
permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Probe live justETF profile pages with the exported extractors
        id: smoke
        working-directory: artifacts/investment-lab
        env:
          # smoke-justetf.mjs writes a structured Markdown report to this path
          # when (and only when) it detects a regression. The next step picks
          # it up as the GitHub Issue body. On a green run nothing is written
          # and the notify step is skipped entirely (silent-success contract).
          SMOKE_FAILURE_REPORT: ${{ runner.temp }}/smoke-failure.md
        run: node scripts/smoke-justetf.mjs

      # Failure notification: open (or comment on) a GitHub Issue describing
      # which canary ISIN(s) regressed and which fields are now empty. We
      # deduplicate by issue title so a multi-day red streak appends comments
      # to the same tracking issue instead of spamming a fresh one every
      # morning. Successful runs skip this step (no spam on the green path).
      - name: Open or update tracking issue on failure
        if: failure() && steps.smoke.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT: ${{ runner.temp }}/smoke-failure.md
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="[justetf-smoke] Layout regression detected"

          # Fall back to a minimal body if the script exited before writing the
          # report (e.g. crashed in main()'s setup) so the issue still gets
          # opened with a link back to the run for triage.
          if [ ! -s "$REPORT" ]; then
            REPORT="${RUNNER_TEMP}/smoke-failure-fallback.md"
            {
              echo "## justETF smoke check failed"
              echo
              echo "The smoke job exited non-zero but did not produce a structured report."
              echo "Inspect the workflow logs directly: $RUN_URL"
            } > "$REPORT"
          fi

          # Append the run link so every issue / comment points back at the
          # exact red run that produced it.
          {
            echo
            echo "---"
            echo "Workflow run: $RUN_URL"
          } >> "$REPORT"

          EXISTING=$(gh issue list \
            --state open \
            --search "\"$TITLE\" in:title" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Re-using open tracking issue #$EXISTING"
            gh issue comment "$EXISTING" --body-file "$REPORT"
          else
            echo "Opening new tracking issue"
            gh issue create --title "$TITLE" --body-file "$REPORT"
          fi

      # Recovery notification: when the smoke job is green AND there is an
      # open tracking issue from a previous red streak, close it with a
      # comment naming the run that recovered. This makes the alert loop
      # self-healing — the on-call engineer doesn't have to remember to
      # close the issue manually after shipping a fix, and the next red run
      # therefore opens a *new* issue (a clean per-incident audit trail)
      # instead of appending to a stale one.
      #
      # Silent-success contract: a green run with no open tracking issue
      # makes no API writes (the `gh issue list` lookup is read-only and the
      # close branch is gated on a non-empty result). No spurious closes,
      # no spurious comments.
      - name: Close tracking issue on recovery
        if: success() && steps.smoke.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="[justetf-smoke] Layout regression detected"

          EXISTING=$(gh issue list \
            --state open \
            --search "\"$TITLE\" in:title" \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$EXISTING" ]; then
            echo "No open tracking issue — nothing to close."
            exit 0
          fi

          echo "Closing recovered tracking issue #$EXISTING"
          gh issue close "$EXISTING" \
            --comment "Smoke check is green again — closing automatically. Recovered by workflow run: $RUN_URL"
