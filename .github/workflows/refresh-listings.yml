name: Refresh ETF listings (nightly justETF snapshot)

# Nightly cadence for the per-exchange ticker map (LSE / XETRA / SIX /
# Euronext) only. Runs the same scrape script as the weekly job but in
# `--mode=listings` so it only touches the `listings` field on each override.
# Default exchange, editorial comment and look-through breakdowns stay
# hand-curated.

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC every day
  workflow_dispatch: # allow manual triggering from the Actions tab

# Serialise with refresh-data.yml: both jobs commit to the same
# etfs.overrides.json. The shared concurrency group prevents push races when
# a nightly and a weekly run overlap (e.g. after a manual workflow_dispatch).
concurrency:
  group: etf-overrides-write
  cancel-in-progress: false

permissions:
  contents: write # required to commit the refreshed JSON

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Refresh listings from justETF (nightly)
        working-directory: artifacts/investment-lab
        run: node scripts/refresh-justetf.mjs --mode=listings

      - name: Run typecheck and tests against the new snapshot
        working-directory: artifacts/investment-lab
        run: |
          pnpm run typecheck
          pnpm run test

      - name: Commit & push if changed
        # The run-log file is always touched by the script (one row per run,
        # success or fail), so this nightly commit step always has something
        # to push — even when no listing tickers changed. That guarantees
        # every scheduled invocation leaves a git commit and a Trigger-tagged
        # row in src/data/refresh-runs.log.md.
        run: |
          git add artifacts/investment-lab/src/data/etfs.overrides.json artifacts/investment-lab/src/data/refresh-runs.log.md artifacts/investment-lab/src/data/refresh-changes.log.jsonl || true
          if [[ -n "$(git status --porcelain artifacts/investment-lab/src/data/etfs.overrides.json artifacts/investment-lab/src/data/refresh-runs.log.md artifacts/investment-lab/src/data/refresh-changes.log.jsonl)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(data): nightly justETF listings snapshot $(date -u +%Y-%m-%d)"
            # Retry push once on non-fast-forward (e.g. a human commit landed
            # while this job was running). The concurrency group prevents
            # bot-vs-bot races; this guards bot-vs-human.
            git push || (git pull --rebase --autostash && git push)
          else
            echo "No file changes (unexpected — run log should always be updated)."
          fi
