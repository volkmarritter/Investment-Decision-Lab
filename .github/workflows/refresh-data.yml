name: Refresh ETF data (justETF snapshot)

# Snapshot-build data pipeline (Variante 1).
# Runs the refresh script once per week, commits any diff in the override JSON
# and lets the normal deploy job ship the new bundle. The app stays
# frontend-only at runtime — no live API call from the browser.
#
# Weekly cadence (instead of daily) keeps the load on justETF very light while
# still capturing TER / AUM / distribution / replication / inception drift in
# a timely manner. Trigger an out-of-band refresh manually via workflow_dispatch
# whenever you need the snapshot updated immediately.

on:
  schedule:
    - cron: "0 3 * * 0" # 03:00 UTC every Sunday
  workflow_dispatch: # allow manual triggering from the Actions tab

permissions:
  contents: write # required to commit the refreshed JSON

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Refresh ETF overrides from justETF
        working-directory: artifacts/investment-lab
        run: node scripts/refresh-justetf.mjs

      - name: Run typecheck and tests against the new snapshot
        working-directory: artifacts/investment-lab
        run: |
          pnpm run typecheck
          pnpm run test

      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain artifacts/investment-lab/src/data/etfs.overrides.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add artifacts/investment-lab/src/data/etfs.overrides.json
            git commit -m "chore(data): weekly justETF snapshot $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No data changes."
          fi
